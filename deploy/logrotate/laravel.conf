# Logrotate — Laravel логи
# Установка: sudo cp /var/www/urban-running-games/deploy/logrotate/laravel.conf /etc/logrotate.d/urban-running
# Путь: замените /var/www/urban-running-games на фактический путь к проекту

/var/www/urban-running-games/storage/logs/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0644 www-data www-data
    sharedscripts
    postrotate
        # Уведомить PHP-FPM о reopen логов (опционально)
        # kill -USR1 $(cat /var/run/php/php8.4-fpm.pid) 2>/dev/null || true
    endscript
}
