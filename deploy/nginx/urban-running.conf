# Nginx vhost — Urban Running Games
# Установка: sudo cp deploy/nginx/urban-running.conf /etc/nginx/sites-available/urban-running
# Активация: sudo ln -s /etc/nginx/sites-available/urban-running /etc/nginx/sites-enabled/
# Путь к проекту: /var/www/urban-running-games (замените при необходимости)
# После certbot — HTTPS добавится автоматически

server {
    listen 80;
    listen [::]:80;
    server_name urban-running-games.ru www.urban-running-games.ru;
    root /var/www/urban-running-games/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    index index.php;

    charset utf-8;

    # Максимальный размер загрузки (для фото в галерею и мерч)
    client_max_body_size 32M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Защита скрытых файлов
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Логи
    access_log /var/log/nginx/urban-running-access.log;
    error_log  /var/log/nginx/urban-running-error.log;
}

# SSL блок создаётся автоматически при запуске:
#   sudo certbot --nginx -d urban-running-games.ru -d www.urban-running-games.ru
#
# Или см. deploy/ssl-letsencrypt.md для ручной настройки
